<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Validate a Certificate</title>
    <style>
         /* Box Error */
    .error-box{
        display: none;
        background-color: #c40000;
        color: white;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
        height: 40px;
        width: 800px;
    }

    .error-box ul{
        margin: 5px 0 0 20px;
    }
     label{
    padding-left: 2%;
}

input{
    padding: 15px;
    font-size: larger;
    position: relative;
    left: 20px;
    border-color: #e6e6e6;
}
input:invalid{
    border: 2px solid red;
    
}

       

        .container{
            padding-left: 1%;
        }
       
         .captcha-box {
            margin-top: 15px;
            border: 1px solid #ccc;
            padding: 10px;
            width: 340px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            left: 20px;
            height: 60px;
            background-color: #f0f0f0;
        }
        span{
            position: relative;
            left: 10px;
        }

        .captcha-left {
            display: flex;
            align-items: center;
            font-size: smaller;
        }

        .captcha-left input {
            margin-right: 8px;
            font-size: 25px;
        }

        .captcha-right {
            margin-left: 35px;
            text-align: right;
            font-size: 10px;
            color: #777;
        }
        .box{
            font-size: small;
        }
        .checkbox{
            transform: scale(1.5);
            
            
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Validate a certificate</h3>
    <br>
    <div class="error-box" id="pesan" >
    <strong>⚠ Sorry! There are a few problems with the selections you made below. Please try again.</strong>
    <br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&bull;&nbsp;Please confirm you are not a robot
    
    
</div>
</div>

   <div class="box">
 <label><strong>Learner's surname</strong></label>
 <br>
 <br>
     <input type="text" id= "nama" value="Arifin" size="30" pattern="Arifin">
     <br>
     <br>
     
     <label><strong>Certificate reference</strong></label><br><br>
     <input type="text" id="sertifikat" value ="OPITOOFED2JH5DS" size="30" pattern="OPITOOFED2JH5DS">
   
     <br>
     <br>
    </div>
    </div>
    
    <div class="captcha-box">
            <div class="captcha-left">
                
                <input type="checkbox" id="robot" class="checkbox">
                <span style="font-size: larger;">&nbsp;&nbsp;&nbsp;&nbsp;Saya bukan robot</span>
            </div>
            
            <div class="captcha-right"><br>
                <img src="https://www.gstatic.com/recaptcha/api2/logo_48.png" 
             id="logo" 
             class="logo-img">
             <br>
               <span style="font-size:small;color: #818181;">reCAPTCHA</span>
            </div>
                
                <div class="button">
                </div>
                </div>
                <br>
                <br>
                
              
              <style>
                    .buttonbiru{
                        background-color: #135f9f;
                        color: #ffffff;
                        padding: 10px;
                        font-size: larger;
                        position: relative;
                        left: 20px;
                        font-size: medium;
                        border-color: #ffffff;


                    }
                    .buttonhijau{
                        background-color: #1e7e34;
                        color: #ffffff;
                        padding: 10px;
                        font-size: larger;
                       float: right;
                       position: relative;
                       right: 3%;
                       font-size: medium;
                       border-color: #ffffff;
                        
                    }
                    .footer{
    position:fixed;
    bottom:25px;
    left:0;
    width:100%;
    background:#135f9f;
    color:white;
    text-align:center;
    padding:18px 0;
    font-weight:bold;
    font-size: small;
}

                    
                </style>
                <div>
                     <button onclick="validasi()" class="buttonbiru">Validate certificate</button>

        <button type ="button" class="buttonhijau"> Click Here To Validate Multiple Certificates</button>
                </div>
                <br>
                <div class="footer">
                    <strong> &nbsp;&nbsp;working together to develope a <br>
                    safe and skilled energy workforce</strong>
                </div>
<script>

function validasi(){

let nama = document.getElementById("nama").value;
let sertifikat = document.getElementById("sertifikat").value;
let robot = document.getElementById("robot").checked;
let pesan = document.getElementById("pesan");

if(nama !== "Arifin"){
pesan.style.display = "block";return
}
else{
    pesan.style.display = "none"
}

if(sertifikat !== "OPITOOFED2JH5DS"){
pesan.style.display = "block";return
}
else{
    pesan.style.display = "none"
}


if(!robot){
pesan.style.display = "block";return}
window.location.href = "https://thehubbopito.github.io/arifin/"
}

</script>
